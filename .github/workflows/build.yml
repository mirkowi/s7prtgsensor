name: Build

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Windows x64 (MSVC)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Dependencies ───────────────────────────────────────────────────────

      - name: Download nlohmann/json
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp" `
            -OutFile "third_party/nlohmann/json.hpp"

      - name: Download snap7 (from GitHub)
        shell: pwsh
        run: |
          $base = "https://raw.githubusercontent.com/davenardella/snap7/master"
          Invoke-WebRequest "$base/release/wrappers/c-cpp/snap7.h" -OutFile "snap7/include/snap7.h"
          Invoke-WebRequest "$base/build/bin/win64/snap7.dll"       -OutFile "snap7/lib/snap7.dll"
          Invoke-WebRequest "$base/build/bin/win64/snap7.lib"       -OutFile "snap7/lib/snap7.lib"
          Write-Host "snap7 OK:"
          Get-ChildItem snap7/include, snap7/lib

      # ── Build ──────────────────────────────────────────────────────────────

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: |
          cmake --build build --config Release

      - name: List output
        shell: pwsh
        run: Get-ChildItem build/Release/

      # ── Artifact ───────────────────────────────────────────────────────────

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: s7sensor-windows-x64
          path: |
            build/Release/s7sensor.exe
            build/Release/snap7.dll
          if-no-files-found: error

      # ── Release (nur bei v*-Tags) ──────────────────────────────────────────

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Release/s7sensor.exe
            build/Release/snap7.dll
          body: |
            ## PRTG S7 Sensor ${{ github.ref_name }}

            ### Installation
            1. `s7sensor.exe` + `snap7.dll` → `%PRTG_PROGRAM_ROOT%\Custom Sensors\EXEXML\`
            2. Konfigurationsdatei (`s7sensor.json`) ebenfalls dorthin kopieren
            3. Sensor-Typ: **EXE/Script Advanced**, Parameter: `--config "%scriptlocation%\s7sensor.json"`
